version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: erp_db
    environment:
      POSTGRES_DB: erp_db
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: erp_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://erp_user:erp_pass@db:5432/erp_db
      DATABASE_URL_SYNC: postgresql://erp_user:erp_pass@db:5432/erp_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ─────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: erp_worker
    command: celery -A workers.tasks.celery_app worker --loglevel=info -Q notifications,emails,documents,automations --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://erp_user:erp_pass@db:5432/erp_db
      DATABASE_URL_SYNC: postgresql://erp_user:erp_pass@db:5432/erp_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  # ── Celery Beat (scheduler) ──────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: erp_beat
    command: celery -A workers.tasks.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://erp_user:erp_pass@db:5432/erp_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - .:/app
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
